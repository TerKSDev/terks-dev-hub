<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OG Image Generator for TerKS.Dev</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: 'Noto Serif JP', serif;
    background-color: #FDFCF8; /* 宣紙底色 */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  /* 核心容器: 設定完美的 1200x630px OG Image 尺寸 */
  .og-image-canvas {
    width: 1200px;
    background-color: #FDFCF8;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05); /* 加一點點陰影，方便在瀏覽器辨識邊界 */
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 100px; /* 大量的留白 (Ma) */
    box-sizing: border-box;
    position: relative;
    overflow: hidden;
  }

  /* --- 左側文字區塊 --- */
  .title-section {
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 700px;
  }

  .main-title {
    font-size: 100px; /* 巨大的標題 */
    font-weight: 500;
    color: #292524; /* 暖墨色 (stone-800) */
    line-height: 0.9;
    letter-spacing: 0.05em;
  }

  .sub-title {
    font-size: 28px;
    color: #78716c; /* 暖灰色 (stone-500) */
    font-weight: 300;
    text-transform: uppercase; /* 全大寫 */
    letter-spacing: 0.4em; /* 極寬的字距 */
    font-family: sans-serif; /* 副標題使用無襯線體 */
    margin-top: 5px;
  }

  /* 裝飾線 (與 Hero 區塊呼應) */
  .decoration-line {
    margin-top: 40px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .red-line {
    width: 60px;
    height: 1.5px;
    background-color: #8B3A3A; /* 印泥紅 */
    opacity: 0.8;
  }

  .stone-line {
    width: 120px;
    height: 1.5px;
    background-color: #e7e5e4;
  }

  /* --- 右側裝飾區塊 --- */
  .side-section {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 60px;
    padding-top: 20px;
    padding-bottom: 20px;
  }

  /* 直排裝飾日文 (シンプルさと機能性の融合) */
  .vertical-text {
    writing-mode: vertical-rl; /* 開啟直排排版 */
    text-orientation: upright;
    font-size: 24px;
    color: #a8a29e; /* 淡淡的灰色 (stone-400) */
    font-weight: 300;
    letter-spacing: 0.6em; /* 極寬的日文字距 */
    opacity: 0.8;
  }

  /* 仿印章 Logo (創) */
  .hanko-stamp {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 80px;
    height: 80px;
    border: 4px solid #8B3A3A; /* 印泥紅 */
    border-radius: 6px;
    font-size: 48px;
    color: #8B3A3A;
    font-weight: 400;
    opacity: 0.9;
  }
</style>
</head>
<body>

  <div class="og-image-canvas">
    
    <div class="title-section">
      <div class="main-title">TerKS.Dev</div>
      <div class="sub-title">Full-Stack Developer</div>
      <div class="decoration-line">
        <div class="red-line"></div>
        <div class="stone-line"></div>
      </div>
    </div>

    <div class="side-section">
      <div class="vertical-text">シンプルさと機能性の融合</div>
      <div class="hanko-stamp">創</div>
    </div>

  </div>

</body>
</html>
